openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Social Commerce Store API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: store
    description: Store operations
  - name: products
    description: Product operations
  - name: categories
    description: Category operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /store:
    get:
      operationId: getStore
      tags: [store]
      summary: Get store profile
      responses:
        "200":
          description: Store profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreProfile"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: featured
          in: query
          required: false
          schema:
            type: boolean
        - name: platform
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Product list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get single product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all categories
      responses:
        "200":
          description: Category list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  /highlights:
    get:
      operationId: listHighlights
      tags: [store]
      summary: List collections (formerly highlights)
      responses:
        "200":
          description: Collections list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Highlight"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SocialLink:
      type: object
      properties:
        platform:
          type: string
          description: "Platform name: instagram, facebook, tiktok, twitter, youtube"
        url:
          type: string
        handle:
          type: string
        followerCount:
          type: integer
      required:
        - platform
        - url
        - handle

    StoreProfile:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
        bio:
          type: string
        tagline:
          type: string
        avatar:
          type: string
        coverImage:
          type: string
        totalFollowers:
          type: integer
        totalSales:
          type: integer
        rating:
          type: number
        reviewCount:
          type: integer
        isVerified:
          type: boolean
        website:
          type: string
        category:
          type: string
        location:
          type: string
        socialLinks:
          type: array
          items:
            $ref: "#/components/schemas/SocialLink"
        memberSince:
          type: string
      required:
        - id
        - username
        - displayName
        - bio
        - avatar
        - totalFollowers
        - totalSales
        - isVerified
        - socialLinks

    Product:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        price:
          type: number
        originalPrice:
          type: number
        currency:
          type: string
        images:
          type: array
          items:
            type: string
        category:
          type: string
        tags:
          type: array
          items:
            type: string
        likes:
          type: integer
        comments:
          type: integer
        shares:
          type: integer
        isLiked:
          type: boolean
        isFeatured:
          type: boolean
        isSoldOut:
          type: boolean
        badge:
          type: string
        platform:
          type: string
          description: "Source platform: instagram, facebook, tiktok"
        postedAt:
          type: string
        sellerUsername:
          type: string
        sellerAvatar:
          type: string
      required:
        - id
        - title
        - description
        - price
        - currency
        - images
        - category
        - tags
        - likes
        - comments
        - shares
        - isLiked
        - isFeatured
        - isSoldOut
        - platform
        - postedAt
        - sellerUsername
        - sellerAvatar

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        emoji:
          type: string
        productCount:
          type: integer
      required:
        - id
        - name
        - slug
        - emoji
        - productCount

    Highlight:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        coverImage:
          type: string
        category:
          type: string
        productCount:
          type: integer
      required:
        - id
        - title
        - coverImage
        - category
        - productCount
